<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tours - Uncover Bahamas</title>
  <link rel="stylesheet" href="tours.css">
</head>

<body>
  <header class="site-header">
    <div class="brand">
      <img src="logo.png" alt="Uncover Bahamas" class="brand-mark">
      <span class="brand-name">Uncover Bahamas</span>
    </div>
    <nav>
      <ul class="main-nav">
        <li><a href="index.html">HOME</a></li>
        <li><a href="about.html">ABOUT US</a></li>
        <li><a href="tours.html" class="active">TOURS</a></li>
        <li><a href="contact.html">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="options">
      <h1>Build your island trip</h1>
      <p>Choose what you enjoy, your budget, and the number of days.</p>

      <label>Choose your interests:</label>

      <label class="choice"><input type="checkbox" name="interest" value="beach">Hidden Beaches</label>
      <label class="choice"><input type="checkbox" name="interest" value="food">Local Food & Culture</label>
      <label class="choice"><input type="checkbox" name="interest" value="adventure">Adventure & Diving</label>
      <label class="choice"><input type="checkbox" name="interest" value="relaxation">Slow Living</label>
      <label class="choice"><input type="checkbox" name="interest" value="history">History</label>
      <label class="choice"><input type="checkbox" name="interest" value="nightlife">Nightlife</label>

      <label for="budget">Budget:</label>
      <select id="budget">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>

      <label for="days">Trip length:</label>
      <select id="days">
        <option value="1">1 day</option>
        <option value="2">2 days</option>
        <option value="3" selected>3 days</option>
        <option value="4">4 days</option>
        <option value="5">5 days</option>
      </select>

      <button onclick="buildTrip()">BUILD MY TRIP</button>
    </section>

    <section>
      <h1>Your itinerary</h1>
      <div id="results" class="empty">Your trip will appear here.</div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Uncover Bahamas</p>
  </footer>

  <script>
    const tours = [
      { name: "Public Beach Morning", interest: "beach", budget: "low", time: "Morning" },
      { name: "Blue Lagoon Snorkel", interest: "beach", budget: "medium", time: "Morning" },
      { name: "Private Island Boat Trip", interest: "beach", budget: "high", time: "Morning" },

      { name: "Local Market Breakfast", interest: "food", budget: "low", time: "Morning" },
      { name: "Arawak Cay Fish Fry", interest: "food", budget: "medium", time: "Evening" },
      { name: "Private Bahamian Dinner", interest: "food", budget: "high", time: "Evening" },

      { name: "Blue Hole Swim", interest: "adventure", budget: "low", time: "Afternoon" },
      { name: "Mangrove Kayak Tour", interest: "adventure", budget: "medium", time: "Afternoon" },
      { name: "Barrier Reef Dive", interest: "adventure", budget: "high", time: "Morning" },

      { name: "Golden Hour Beach Walk", interest: "relaxation", budget: "low", time: "Evening" },
      { name: "Sunset Catamaran Sail", interest: "relaxation", budget: "medium", time: "Evening" },
      { name: "Seaside Spa Morning", interest: "relaxation", budget: "high", time: "Morning" },

      { name: "Fort Charlotte Visit", interest: "history", budget: "low", time: "Morning" },
      { name: "Junkanoo Culture Tour", interest: "history", budget: "medium", time: "Afternoon" },
      { name: "Private Heritage Tour", interest: "history", budget: "high", time: "Afternoon" },

      { name: "Local Music Night", interest: "nightlife", budget: "low", time: "Evening" },
      { name: "Rooftop Cocktails", interest: "nightlife", budget: "medium", time: "Evening" },
      { name: "Casino and Dinner", interest: "nightlife", budget: "high", time: "Evening" }
    ];

    function buildTrip() {
      const interests = [...document.querySelectorAll('input[name="interest"]:checked')].map(box => box.value);
      const budget = document.getElementById("budget").value;
      const days = Number(document.getElementById("days").value);

      let matches = tours.filter(tour => tour.budget === budget && (!interests.length || interests.includes(tour.interest)));

      if (!matches.length) {
        document.getElementById("results").innerHTML = "No matching tours. Try another budget or interest.";
        return;
      }

      let html = "";

      for (let day = 1; day <= days; day++) {
        html += `<div class="day"><h2>Day ${day}</h2>`;

        ["Morning", "Afternoon", "Evening"].forEach(time => {
          const choices = matches.filter(tour => tour.time === time);
          const list = choices.length ? choices : matches;
          const tour = list[Math.floor(Math.random() * list.length)];
          html += `<p><strong>${time}:</strong> ${tour.name}</p>`;
        });

        html += "</div>";
      }

      document.getElementById("results").innerHTML = html;
    }
  </script>
</body>
</html>
